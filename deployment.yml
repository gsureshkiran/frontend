apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecomm

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ecomm

  template:

    metadata:
      labels:
        app: ecomm

    spec:

      containers:

      - name: ecomm

        image: sureshkiran/petclinic:latest

        ports:

        - containerPort: 8080
---
apiVersion: v1
kind: Service

metadata:
  name: ecomm-service

spec:

  type: LoadBalancer

  selector:
    app: ecomm

  ports:

  - port: 8080

    targetPort: 8080

---
- name: CD Pipeline - Download WAR from Nexus, Build Docker Image and Push
  hosts: ci
  become: yes

  vars_files:
    - nexuspass.yaml

  vars:

    repo_dest: /opt/ecomm

    nexus_url: http://13.234.21.8:8081

    nexus_repo: maven-releases

    group_id: com.mycompany

    artifact_id: Ecomm

    version: "1.0"

    image_name: sureshkiran/petclinic

    image_tag: "1.0"

  tasks:

###########################################
# Update Ubuntu
###########################################

    - name: Update apt cache
      apt:
        update_cache: yes

###########################################
# Install packages
###########################################

    - name: Install required packages
      apt:
        name:
          - docker.io
          - python3-pip
          - curl
        state: present

###########################################
# Install Docker SDK
###########################################

    - name: Install Docker Python SDK
      pip:
        name: docker
        break_system_packages: true

###########################################
# Enable Docker
###########################################

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

###########################################
# Add ubuntu user to docker group
###########################################

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

###########################################
# Create project directory
###########################################

    - name: Create project directory
      file:
        path: "{{ repo_dest }}"
        state: directory
        mode: "0755"

###########################################
# Download WAR from Nexus
###########################################

    - name: Download artifact from Nexus
      get_url:
        url: "{{ nexus_url }}/repository/{{ nexus_repo }}/com/mycompany/Ecomm/1.0/Ecomm-1.0.war"
        dest: "{{ repo_dest }}/Ecomm.war"
        url_username: admin
        url_password: "{{ nexus_admin_password }}"
        force_basic_auth: yes
        mode: "0644"
###################################
#copy tomcat-users.xml
#################################
    - name: copy tomcat-users.xml file
      copy:
        src: /home/ubuntu/tomcat-users.xml
        dest: "{{ repo_dest }}"

###########################################
# Create Dockerfile
###########################################

    - name: Create Dockerfile
      copy:
        dest: "{{ repo_dest }}/Dockerfile"
        content: |
          FROM tomcat:7-jre7

          LABEL maintainer="Ansible"
          COPY tomcat-users.xml /usr/local/tomcat/conf

          COPY Ecomm.war /usr/local/tomcat/webapps/

          EXPOSE 8080

      
     
    - name: Build Docker image
      community.docker.docker_image:
        name: "{{ image_name }}"
        tag: "{{ image_tag }}"
        source: build
        build:
          path: "{{ repo_dest }}"
          pull: yes

    - name: List Docker images
      command: docker images
      register: docker_images
      changed_when: false

     
    - name: Display Docker images
      debug:
        var: docker_images.stdout_lines 



    - name: Login to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"


    - name: Push Docker image to Docker Hub
      community.docker.docker_image:
        name: "{{ image_name }}"
        tag: "{{ image_tag }}"
        push: true
        source: local
     
    - name: Deployment completed
      debug:
        msg:
          - "WAR downloaded successfully from Nexus."
          - "Docker image built successfully."
          - "Docker image pushed to Docker Hub."
          - "Image: {{ image_name }}:{{ image_tag }}"   


